
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Letters</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #020617;
    }
    
    /* Spatial Background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, #1e293b 0%, #020617 70%);
      z-index: -1;
    }

    .perspective-1000 { perspective: 1000px; }
    .preserve-3d { transform-style: preserve-3d; }
    
    @keyframes swim {
      0% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
      33% { transform: translateY(-10px) rotateX(1deg) rotateY(-1deg); }
      66% { transform: translateY(5px) rotateX(-1deg) rotateY(1deg); }
      100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
    }

    @keyframes bounce-in {
      0% { transform: scale(0.3) translateY(50px); opacity: 0; }
      50% { transform: scale(1.05) translateY(-10px); opacity: 1; }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-spin-slow {
      animation: spin 3s linear infinite;
    }

    .animate-swim {
      animation: swim 8s ease-in-out infinite;
      will-change: transform;
    }

    .animate-swim-slow {
      animation: swim 12s ease-in-out infinite;
      will-change: transform;
    }

    .animate-swim-fast {
      animation: swim 6s ease-in-out infinite;
      will-change: transform;
    }

    .animate-bounce-in { animation: bounce-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    .animate-marquee {
      display: flex;
      width: max-content;
      animation: marquee 20s linear infinite;
      will-change: transform;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Spatial hover effect for cards */
    .spatial-card:hover {
      transform: translateZ(20px) scale(1.05);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    /* Custom Scrollbar for Language Menu */
    .custom-scrollbar::-webkit-scrollbar {
      display: block;
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .custom-scrollbar-h::-webkit-scrollbar {
      display: block;
      height: 3px;
    }
    .custom-scrollbar-h::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar-h::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    .custom-scrollbar-h::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Hide scrollbar but keep functionality */
    ::-webkit-scrollbar { display: none; }
    * {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    
    /* Prevent pull-to-refresh and overscroll glow on mobile */
    html, body {
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
